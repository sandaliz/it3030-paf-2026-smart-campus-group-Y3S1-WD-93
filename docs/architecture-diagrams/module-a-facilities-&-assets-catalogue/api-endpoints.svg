<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="apiHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf360c"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="#f5f7fb"/>

  <rect x="0" y="0" width="1200" height="60" fill="url(#apiHeader)"/>
  <text x="600" y="38" text-anchor="middle" fill="white" font-size="22" font-weight="bold">REST API Endpoints</text>

  <rect x="80" y="90" width="480" height="110" rx="8" fill="#fff3e0" filter="url(#shadow)"/>
  <text x="100" y="118" fill="#bf360c" font-size="14" font-weight="bold">GET    /api/resources</text>
  <text x="100" y="142" fill="#e65100" font-size="13">Get all resources</text>
  <text x="100" y="168" fill="#bf360c" font-size="14" font-weight="bold">GET    /api/resources/{id}</text>
  <text x="100" y="190" fill="#e65100" font-size="13">Get resource by ID</text>

  <rect x="600" y="90" width="480" height="110" rx="8" fill="#fff3e0" filter="url(#shadow)"/>
  <text x="620" y="118" fill="#bf360c" font-size="14" font-weight="bold">POST   /api/resources</text>
  <text x="620" y="142" fill="#e65100" font-size="13">Create new resource</text>
  <text x="620" y="168" fill="#bf360c" font-size="14" font-weight="bold">PUT    /api/resources/{id}</text>
  <text x="620" y="190" fill="#e65100" font-size="13">Update existing resource</text>

  <rect x="80" y="230" width="480" height="90" rx="8" fill="#ffebee" filter="url(#shadow)"/>
  <text x="100" y="258" fill="#c62828" font-size="14" font-weight="bold">DELETE /api/resources/{id}</text>
  <text x="100" y="282" fill="#d32f2f" font-size="13">Delete resource by ID</text>
  <text x="100" y="305" fill="#ef5350" font-size="12">Admin only</text>

  <rect x="600" y="230" width="480" height="90" rx="8" fill="#e0f2f1" filter="url(#shadow)"/>
  <text x="620" y="258" fill="#004d40" font-size="14" font-weight="bold">GET    /api/resources/search</text>
  <text x="620" y="282" fill="#00695c" font-size="13">Search with filters</text>
  <text x="620" y="305" fill="#00838f" font-size="12">status, type, minCapacity, location</text>

  <rect x="150" y="350" width="900" height="55" rx="8" fill="#e8eaf6"/>
  <text x="600" y="375" text-anchor="middle" fill="#283593" font-size="14" font-weight="bold">Additional Endpoints</text>
  <text x="600" y="398" text-anchor="middle" fill="#3949ab" font-size="12">
    POST /api/resources/bulk → Bulk create | GET /api/resources/{id}/availability → Check availability
  </text>

  <rect x="250" y="430" width="700" height="40" rx="8" fill="#eceff1"/>
  <text x="600" y="455" text-anchor="middle" fill="#37474f" font-size="13">
    Base URL: http://localhost:8080/api | Content-Type: application/json
  </text>
</svg>