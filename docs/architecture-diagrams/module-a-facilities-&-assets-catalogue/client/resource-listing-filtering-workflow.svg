<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="filterHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a148c"/>
      <stop offset="100%" style="stop-color:#6a1b9a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="550" fill="#f5f7fb"/>

  <rect x="0" y="0" width="1200" height="60" fill="url(#filterHeader)"/>
  <text x="600" y="38" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Resource Listing and Filtering Flow</text>

  <rect x="60" y="90" width="240" height="100" rx="8" fill="#f3e5f5" filter="url(#shadow)"/>
  <text x="180" y="118" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">Search Filter</text>
  <text x="180" y="142" text-anchor="middle" fill="#6a1b9a" font-size="12">Name / Location</text>
  <text x="180" y="162" text-anchor="middle" fill="#6a1b9a" font-size="12">Description</text>

  <rect x="330" y="90" width="240" height="100" rx="8" fill="#f3e5f5" filter="url(#shadow)"/>
  <text x="450" y="118" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">Type Filter</text>
  <text x="450" y="142" text-anchor="middle" fill="#6a1b9a" font-size="12">Lecture Hall / Lab</text>
  <text x="450" y="162" text-anchor="middle" fill="#6a1b9a" font-size="12">Meeting Room / Office</text>

  <rect x="600" y="90" width="240" height="100" rx="8" fill="#f3e5f5" filter="url(#shadow)"/>
  <text x="720" y="118" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">Status Filter</text>
  <text x="720" y="142" text-anchor="middle" fill="#6a1b9a" font-size="12">ACTIVE</text>
  <text x="720" y="162" text-anchor="middle" fill="#6a1b9a" font-size="12">OUT_OF_SERVICE</text>

  <rect x="870" y="90" width="240" height="100" rx="8" fill="#f3e5f5" filter="url(#shadow)"/>
  <text x="990" y="118" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">Advanced Filters</text>
  <text x="990" y="142" text-anchor="middle" fill="#6a1b9a" font-size="12">Minimum Capacity</text>
  <text x="990" y="162" text-anchor="middle" fill="#6a1b9a" font-size="12">Amenities</text>

  <rect x="180" y="220" width="840" height="55" rx="8" fill="#eceff1"/>
  <text x="600" y="245" text-anchor="middle" fill="#37474f" font-size="14" font-weight="bold">Initial Load Flow</text>
  <text x="600" y="265" text-anchor="middle" fill="#546e7f" font-size="12">
    useEffect triggers → GET /api/resources → MongoDB find all → setResources → Render table
  </text>

  <rect x="180" y="295" width="840" height="55" rx="8" fill="#e8eaf6"/>
  <text x="600" y="320" text-anchor="middle" fill="#283593" font-size="14" font-weight="bold">Filter Application Flow</text>
  <text x="600" y="340" text-anchor="middle" fill="#3949ab" font-size="12">
    User changes filter → Debounce 500ms → GET /api/resources/search → Apply client filters → Update UI
  </text>

  <rect x="300" y="380" width="600" height="50" rx="8" fill="#e0f2f1"/>
  <text x="600" y="405" text-anchor="middle" fill="#004d40" font-size="14" font-weight="bold">Pagination</text>
  <text x="600" y="422" text-anchor="middle" fill="#00695c" font-size="12">
    Client-side slice: startIndex = page × size | endIndex = startIndex + size
  </text>

  <rect x="350" y="460" width="500" height="45" rx="8" fill="#fff8e1"/>
  <text x="600" y="483" text-anchor="middle" fill="#e65100" font-size="13" font-weight="bold">Performance Optimization</text>
  <text x="600" y="500" text-anchor="middle" fill="#f57c00" font-size="11">
    Debounced search | Client-side filtering | MongoDB indexes on status, type, location
  </text>
</svg>