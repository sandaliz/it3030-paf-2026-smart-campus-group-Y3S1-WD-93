spring.application.name=backend

spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.data.mongodb.uri=${MONGO_URI:${MONGODB_URI:mongodb://localhost:27017/uniops}}

# OAuth 2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8081/login/oauth2/code/google}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

spring.websocket.broker.enabled=true

server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

logging.level.com.sliit.uniops=DEBUG
logging.level.org.springframework.security=INFO

# File storage configuration
app.upload.dir=${UPLOAD_DIR:./uploads}
app.qr-code.dir=${QR_CODE_DIR:./qr-codes}

# CORS configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}