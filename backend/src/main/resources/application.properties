spring.application.name=backend



spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]



spring.data.mongodb.uri=${MONGO_URI:${MONGODB_URI:mongodb://localhost:27017/uniops}}



spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}

spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=email,profile



spring.servlet.multipart.max-file-size=5MB

spring.servlet.multipart.max-request-size=10MB



spring.websocket.broker.enabled=true

server.port=8080
server.error.include-message=always

server.error.include-binding-errors=always



logging.level.com.sliit.uniops=DEBUG

logging.level.org.springframework.security=INFO



# File storage configuration

app.upload.dir=${UPLOAD_DIR:./uploads}

app.qr-code.dir=${QR_CODE_DIR:./qr-codes}



# CORS configuration

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}



# JWT configuration

jwt.secret=${JWT_SECRET:v9y$B&E)H@McQfTjWnZr4u7x!A%D*G-KaNdRgUkXp2s5v8y/B?E(H+MbQeShVmYq}

jwt.expiration=86400000



# Frontend URL

app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Google Calendar Configuration

google.calendar.client-id=${GOOGLE_CALENDAR_CLIENT_ID:}

google.calendar.client-secret=${GOOGLE_CALENDAR_CLIENT_SECRET:}

google.calendar.timezone=${GOOGLE_CALENDAR_TIMEZONE:Asia/Colombo}

google.calendar.scopes=${GOOGLE_CALENDAR_SCOPES:https://www.googleapis.com/auth/calendar}

# Role-based Email Assignments

auth.admins=${AUTH_ADMINS:}

auth.students=${AUTH_STUDENTS:}

auth.lecturers=${AUTH_LECTURERS:}

auth.staff=${AUTH_STAFF:}

auth.technicians=${AUTH_TECHNICIANS:}

# Google Calendar API Configuration
