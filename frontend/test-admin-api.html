<!DOCTYPE html>
<html>
<head>
    <title>Test Admin API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { margin: 5px; padding: 10px; cursor: pointer; }
        .results { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
        .error { color: red; }
        .success { color: green; }
        .debug { background: #f5f5f5; padding: 10px; margin: 10px 0; }
        input { margin: 5px; padding: 5px; width: 300px; }
    </style>
</head>
<body>
    <h1>Admin API Debug Tool</h1>
    
    <div class="debug">
        <h3>Authentication Token</h3>
        <input type="text" id="token" placeholder="Paste your JWT token here" />
        <button onclick="setToken()">Set Token</button>
        <button onclick="clearToken()">Clear Token</button>
        <div id="tokenStatus"></div>
    </div>

    <div class="debug">
        <h3>API Endpoints</h3>
        <button onclick="testUsersEndpoint()">Test Users Endpoint</button>
        <button onclick="testStatsEndpoint()">Test Stats Endpoint</button>
        <button onclick="testTestEndpoint()">Test Simple Endpoint</button>
        <button onclick="testDebugEndpoint()">Test Debug Endpoint</button>
    </div>

    <div class="debug">
        <h3>Current Status</h3>
        <button onclick="checkLocalStorage()">Check LocalStorage</button>
        <button onclick="checkBackendStatus()">Check Backend Status</button>
    </div>

    <div id="results" class="results"></div>

    <script>
        let authToken = localStorage.getItem('token') || '';

        function updateTokenStatus() {
            const status = document.getElementById('tokenStatus');
            if (authToken) {
                status.innerHTML = '<span class="success">Token is set</span>';
                document.getElementById('token').value = authToken;
            } else {
                status.innerHTML = '<span class="error">No token set</span>';
            }
        }

        function setToken() {
            authToken = document.getElementById('token').value.trim();
            if (authToken) {
                localStorage.setItem('token', authToken);
                updateTokenStatus();
                addResult('Token set successfully', 'success');
            } else {
                addResult('Please enter a valid token', 'error');
            }
        }

        function clearToken() {
            authToken = '';
            localStorage.removeItem('token');
            document.getElementById('token').value = '';
            updateTokenStatus();
            addResult('Token cleared', 'success');
        }

        function checkLocalStorage() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            addResult('LocalStorage Check:', 'debug');
            addResult('Token exists: ' + (token ? 'YES' : 'NO'), 'debug');
            addResult('User exists: ' + (user ? 'YES' : 'NO'), 'debug');
            if (token) {
                addResult('Token length: ' + token.length, 'debug');
                addResult('Token preview: ' + token.substring(0, 50) + '...', 'debug');
            }
        }

        async function checkBackendStatus() {
            try {
                const response = await fetch('http://localhost:8080/api/admin/dashboard/test', {
                    method: 'GET',
                    headers: getHeaders()
                });
                addResult('Backend Status: ' + response.status + ' ' + response.statusText, response.ok ? 'success' : 'error');
                const data = await response.json();
                addResult('Backend Response: ' + JSON.stringify(data), 'debug');
            } catch (error) {
                addResult('Backend Connection Error: ' + error.message, 'error');
            }
        }

        function getHeaders() {
            const headers = {
                'Content-Type': 'application/json'
            };
            if (authToken) {
                headers['Authorization'] = 'Bearer ' + authToken;
            }
            return headers;
        }

        async function testUsersEndpoint() {
            addResult('Testing Users Endpoint...', 'debug');
            try {
                const response = await fetch('http://localhost:8080/api/admin/dashboard/users', {
                    method: 'GET',
                    headers: getHeaders()
                });
                
                addResult('Status: ' + response.status + ' ' + response.statusText, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                addResult('Users Response:', 'debug');
                addResult(JSON.stringify(data, null, 2), 'debug');
                
                if (Array.isArray(data)) {
                    addResult('Success: Received ' + data.length + ' users', 'success');
                } else if (data.error) {
                    addResult('Error from server: ' + data.error, 'error');
                } else if (response.status === 500) {
                    addResult('500 Internal Server Error - Backend is crashing', 'error');
                    addResult('Check backend logs for stack trace', 'error');
                }
            } catch (error) {
                addResult('Users Error: ' + error.message, 'error');
            }
        }

        async function testStatsEndpoint() {
            addResult('Testing Stats Endpoint...', 'debug');
            try {
                const response = await fetch('http://localhost:8080/api/admin/dashboard/stats', {
                    method: 'GET',
                    headers: getHeaders()
                });
                
                addResult('Status: ' + response.status + ' ' + response.statusText, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                addResult('Stats Response:', 'debug');
                addResult(JSON.stringify(data, null, 2), 'debug');
            } catch (error) {
                addResult('Stats Error: ' + error.message, 'error');
            }
        }

        async function testTestEndpoint() {
            addResult('Testing Simple Test Endpoint...', 'debug');
            try {
                const response = await fetch('http://localhost:8080/api/admin/dashboard/test', {
                    method: 'GET',
                    headers: getHeaders()
                });
                
                addResult('Status: ' + response.status + ' ' + response.statusText, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                addResult('Test Response:', 'debug');
                addResult(JSON.stringify(data, null, 2), 'debug');
            } catch (error) {
                addResult('Test Error: ' + error.message, 'error');
            }
        }

        async function testDebugEndpoint() {
            addResult('Testing Debug Endpoint...', 'debug');
            try {
                const response = await fetch('http://localhost:8080/api/admin/dashboard/debug/users-with-invalid-roles', {
                    method: 'GET',
                    headers: getHeaders()
                });
                
                addResult('Status: ' + response.status + ' ' + response.statusText, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                addResult('Debug Response:', 'debug');
                addResult(JSON.stringify(data, null, 2), 'debug');
            } catch (error) {
                addResult('Debug Error: ' + error.message, 'error');
            }
        }

        function addResult(message, type = 'debug') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = type;
            div.style.marginBottom = '5px';
            div.style.whiteSpace = 'pre-wrap';
            div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            results.appendChild(div);
            results.scrollTop = results.scrollHeight;
        }

        // Initialize
        updateTokenStatus();
        addResult('Debug tool loaded. Check authentication token first.', 'debug');
    </script>
</body>
</html>
